[tool.ruff]
preview = true
line-length = 120
fix = true
output-format = "grouped"

[tool.ruff.lint]
ignore = [
    "N999",    # Invalid module name - CamelCase module dirs are intentional
    "EXE001",  # Shebang present but file is not executable
]

[tool.ruff.format]
exclude = [".git", ".venv", ".mypy_cache", ".tox", "__pycache__"]
